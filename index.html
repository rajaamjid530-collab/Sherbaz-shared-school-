<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sherbaz School System - Live Data</title>
    <!-- React & Firebase Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        // فائر بیس کنفیگریشن (آپ کے پروجیکٹ سے لی گئی ہے)
        const firebaseConfig = {
            apiKey: "AIzaSyB4spY-hxsdPy-V6yATT16c_JU7k",
            authDomain: "planning-with-ai-d9722.firebaseapp.com",
            projectId: "planning-with-ai-d9722",
            storageBucket: "planning-with-ai-d9722.firebasestorage.app",
            messagingSenderId: "839875393490",
            appId: "1:839875393490:web:90d735888d08a41141a0b"
        };

        // فائر بیس شروع کریں
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const { useState } = React;

        function SchoolApp() {
            const [student, setStudent] = useState({ name: '', class: '', roll: '' });
            const [status, setStatus] = useState("");

            // ڈیٹا بیس میں سیو کرنے کا فنکشن
            const saveData = async () => {
                setStatus("سیو ہو رہا ہے...");
                try {
                    await db.collection("students").add({
                        ...student,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setStatus("کامیابی سے سیو ہو گیا!");
                    alert("ڈیٹا فائر بیس میں محفوظ ہو گیا ہے!");
                } catch (error) {
                    setStatus("ایرر: " + error.message);
                }
            };

            return (
                <div className="max-w-md mx-auto mt-10 p-6 bg-white rounded-xl shadow-lg">
                    <h1 className="text-xl font-bold mb-4 text-center border-b pb-2">اسکول ڈیٹا انٹری (Live)</h1>
                    
                    <div className="space-y-4">
                        <input type="text" placeholder="طالب علم کا نام" className="w-full border p-2 rounded" 
                            onChange={(e) => setStudent({...student, name: e.target.value})} />
                        
                        <input type="text" placeholder="کلاس" className="w-full border p-2 rounded" 
                            onChange={(e) => setStudent({...student, class: e.target.value})} />
                        
                        <input type="text" placeholder="رول نمبر" className="w-full border p-2 rounded" 
                            onChange={(e) => setStudent({...student, roll: e.target.value})} />

                        <button onClick={saveData} className="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">
                            فائر بیس میں محفوظ کریں
                        </button>
                    </div>

                    {status && <p className="mt-4 text-center text-sm font-bold text-blue-600">{status}</p>}
                    
                    <div className="mt-6 text-xs text-gray-400 text-center">
                        نوٹ: یہ ڈیٹا اب آپ کے فائر بیس کنسول میں نظر آئے گا۔
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SchoolApp/>);
    </script>
</body>
</html>
